<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ali Ahmad</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: "Roboto";
            background-color: #FFFDF6;
        }
        .name-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #FAF6E9;
            padding: 5em;
        }
        .title-text {
            display: flex;
            flex-direction: column;
            color: #A0C878;
            align-items: center;
        }
        .strike-text {
            text-decoration: line-through;
        }
        .intro {
            display: flex;
            flex-direction: column;
            height: 60vh;
            align-items: center;
            justify-content: center;
            gap: 20px;
            font-size: larger;
        }
        .intro > p {
            width: 30%;
            text-align: center;
        }
        .square-container {
            height: 300px;
            width: 300px;
            overflow: hidden;
        }
        .square-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
        .contact {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: larger;
            gap: 1rem;
            padding-bottom: 5rem;
        }
        .contact > h1 {
            color: #A0C878;
        }
        .footer {
            display: flex;
            flex-direction: column;
            color: #FFFDF6;
            align-items: center;
            justify-content: center;
            background-color: #A0C878;
            padding: 1em;
            gap: 0.5rem;
        }
        .socials > a {
            color: #FFFDF6;
            text-decoration: none;
        }

        @media (max-width: 800px) {

        .name-container > img {
            height: 300px;
        }

        .square-container {
            height: 200px;
            width: 200px
        }
        }
    </style>
</head>
<body>
    <div class="name-container">
        <div class="title-text">
            <h1>I'm Ali Ahmad</h1>
            <h2 class="strike-text">a programmar</h2>
        </div>
        <img src="./computers.png" alt="computers"/>
    </div>
    <div class="intro">
        <div class="square-container">
            <img src="./Linked In Picture.jpeg" alt="Linked In Picture"/>
        </div> 
        <p>
            My name is Ali Ahmad and I'm a developer. I'm doing my masters in Computer Science from RIT.
        </p>
    </div>
    <div class="contact">
        <h1>Get In Touch</h1>
        <p>
            Want to get started with a new project?
        </p>
        <a type="button" class="btn btn-success btn-lg" href="https://www.linkedin.com/in/aliahhmad/">Contact Me</a>
    </div>
    <div class="footer">
        <div class="socials">
            <a href="https://www.linkedin.com/in/aliahhmad/">Linked In</a>
        </div>
        <p>@Ali Ahmad</p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>   
</body>
</html>
